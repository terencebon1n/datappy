version: "3"

services:
  postgres:
    image: postgres:17
    restart: always
    environment:
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - 5432:5432
    volumes:
      - pgdata:/var/lib/postgresql/datappy-data

  kafka-broker:
    image: apache/kafka:latest
    container_name: broker
    networks:
      - spark-net
    ports:
      - "9092:9092" 
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: EXTERNAL://0.0.0.0:9092,INTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      # FIX: Use 'broker' for internal quorum and advertised listeners
      KAFKA_ADVERTISED_LISTENERS: EXTERNAL://localhost:9092,INTERNAL://broker:29092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: EXTERNAL:PLAINTEXT,INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@broker:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  spark-master:
    build:
      context: .
      dockerfile: Dockerfile.spark
    container_name: spark-master
    hostname: spark-master
    networks:
      - spark-net
    ports:
      - "15002:15002"
      - "8080:8080"
      - "7077:7077"
    environment:
      - SPARK_LOCAL_IP=spark-master
      - SPARK_MASTER_PORT=7077
      - SPARK_MASTER_WEBUI_PORT=8080
      # Force Spark to include the connect jars in the classpath
      - SPARK_DIST_CLASSPATH=/opt/spark/jars/*
      - SPARK_MASTER_OPTS=-Dspark.plugins=org.apache.spark.sql.connect.SparkConnectPlugin -Dspark.connect.grpc.binding.port=15002 -Dspark.connect.grpc.binding.address=0.0.0.0 -Djava.net.preferIPv4Stack=true
    command: >
      /bin/bash -c "
      /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master --host spark-master &
      /opt/spark/sbin/start-connect-server.sh 
      --master spark://spark-master:7077 
      --packages org.apache.spark:spark-sql-kafka-0-10_2.13:4.1.0 
      --conf spark.connect.grpc.binding.address=0.0.0.0 
      --conf spark.connect.grpc.binding.port=15002;
      tail -f /opt/spark/logs/*"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://spark-master:8080"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 10s

  spark-worker:
    build:
      context: .
      dockerfile: Dockerfile.spark
    networks:
      - spark-net
    depends_on:
      spark-master:
        condition: service_healthy
    environment:
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_LOCAL_IP=spark-worker
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker
      spark://spark-master:7077

networks:
  spark-net:
    driver: bridge

volumes:
  pgdata:
