version: "3"

services:
  datappy:
    build: .
    container_name: datappy
    depends_on:
      - postgres
      - kafka-broker
      - redis
    ports:
      - "8000:8000"
    networks:
      - realtime-net
      - schedule-net

  postgres:
    image: postgres:17
    container_name: postgres
    restart: always
    environment:
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - 5432:5432
    volumes:
      - pgdata:/var/lib/postgresql/datappy-data
    networks:
      - schedule-net

  kafka-broker:
    image: apache/kafka:latest
    container_name: broker
    networks:
      - realtime-net
    ports:
      - "9092:9092" 
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: EXTERNAL://broker:9092,INTERNAL://broker:29092,CONTROLLER://broker:9093
      # FIX: Use 'broker' for internal quorum and advertised listeners
      KAFKA_ADVERTISED_LISTENERS: EXTERNAL://broker:9092,INTERNAL://broker:29092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: EXTERNAL:PLAINTEXT,INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@broker:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - realtime-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

networks:
  realtime-net:
    driver: bridge
  schedule-net:
    driver: bridge

volumes:
  pgdata:
