<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Datappy Admin</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f4f5f7; color: #1a1a2e; min-height: 100vh; }

        header { background: #1a1a2e; color: white; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        header h1 { font-size: 1.1rem; font-weight: 600; letter-spacing: 0.5px; }
        .btn-logout { background: transparent; border: 1px solid rgba(255,255,255,0.3); color: white; padding: 0.4rem 1rem; border-radius: 4px; cursor: pointer; font-size: 0.85rem; }
        .btn-logout:hover { background: rgba(255,255,255,0.1); }

        main { padding: 2rem; max-width: 860px; margin: 0 auto; }
        .meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
        .meta h2 { font-size: 0.85rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; color: #888; }
        .last-updated { font-size: 0.75rem; color: #aaa; }

        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
        th { background: #f8f9fa; padding: 0.75rem 1.25rem; text-align: left; font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; color: #888; border-bottom: 1px solid #eee; }
        td { padding: 0.9rem 1.25rem; border-bottom: 1px solid #f2f2f2; font-size: 0.9rem; vertical-align: middle; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #fafafa; }

        .city { font-weight: 600; text-transform: capitalize; }
        .service { text-transform: capitalize; color: #555; }

        .badge { display: inline-flex; align-items: center; gap: 0.35rem; padding: 0.25rem 0.65rem; border-radius: 99px; font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px; }
        .badge::before { content: ''; width: 6px; height: 6px; border-radius: 50%; }
        .running { background: #e8f5e9; color: #2e7d32; }
        .running::before { background: #43a047; }
        .stopped { background: #f5f5f5; color: #757575; }
        .stopped::before { background: #bdbdbd; }
        .crashed { background: #ffebee; color: #c62828; }
        .crashed::before { background: #ef5350; }

        .actions { display: flex; gap: 0.4rem; }
        .btn { padding: 0.35rem 0.85rem; border: none; border-radius: 4px; cursor: pointer; font-size: 0.8rem; font-weight: 600; }
        .btn:disabled { opacity: 0.35; cursor: not-allowed; }
        .btn-start { background: #43a047; color: white; }
        .btn-start:not(:disabled):hover { background: #388e3c; }
        .btn-stop { background: #ef5350; color: white; }
        .btn-stop:not(:disabled):hover { background: #e53935; }
    </style>
</head>
<body>
    <header>
        <h1>Datappy Admin</h1>
        <button class="btn-logout" onclick="logout()">Logout</button>
    </header>
    <main>
        <div class="meta">
            <h2>Services</h2>
            <span class="last-updated" id="last-updated"></span>
        </div>
        <table>
            <thead>
                <tr>
                    <th>City</th>
                    <th>Service</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="tbody"></tbody>
        </table>
    </main>
    <script>
        const API = `${window.location.protocol}//${window.location.hostname}:8000`;

        async function fetchStatus() {
            const res = await fetch(`${API}/admin/status`, { credentials: 'include' });
            if (res.status === 401) { window.location.href = `${API}/admin/login`; return; }
            const services = await res.json();
            document.getElementById('tbody').innerHTML = services.map(s => `
                <tr>
                    <td class="city">${s.city}</td>
                    <td class="service">${s.service}</td>
                    <td><span class="badge ${s.status}">${s.status}</span></td>
                    <td class="actions">
                        <button class="btn btn-start"
                            onclick="action('start','${s.service}','${s.city}')"
                            ${s.status === 'running' ? 'disabled' : ''}>Start</button>
                        <button class="btn btn-stop"
                            onclick="action('stop','${s.service}','${s.city}')"
                            ${s.status !== 'running' ? 'disabled' : ''}>Stop</button>
                    </td>
                </tr>
            `).join('');
            document.getElementById('last-updated').textContent = `Refreshed at ${new Date().toLocaleTimeString()}`;
        }

        async function action(type, service, city) {
            await fetch(`${API}/admin/${service}/${city}/${type}`, { method: 'POST', credentials: 'include' });
            fetchStatus();
        }

        async function logout() {
            await fetch(`${API}/admin/logout`, { credentials: 'include' });
            window.location.href = `${API}/admin/login`;
        }

        fetchStatus();
        setInterval(fetchStatus, 5000);
    </script>
</body>
</html>
